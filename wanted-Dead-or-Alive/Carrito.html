<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Carrito</title>
    <link rel="icon" type="image/x-icon" href="src/img/favicon.ico">
</head>
<body>
    <header>
        <!-- Contenedor del menú de navegación -->
        <div class="menu">
            <!-- Logo de la página -->
            <div class="logo">
                <h1>Fitness <span>Max</span></h1>
            </div>
            <!-- Lista de enlaces y iconos del menú -->
            <ul class="ulista">
                <li><a href="#">Productos</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#"><img src="src/img/Header/icons8-magnifying-glass-white.svg" alt="Ícono de búsqueda" /></a>
                </li>
                <li><a href="#"><img src="src/img/Header/icons8-male-user-50-white.png" alt="Ícono de usuario" /></a></li>
                <li><a href="#"><img src="src/img/Header/icons8-cart-50-white.png" alt="Ícono de carrito de compras" /></a>
                </li>
                <li><a href="#"><img src="src/img/Header/Menu móvil.png" alt="Ícono de menú desplegable" /></a></li>
            </ul>
        </div>
    </header>
    <main>
        <section class="productos">
            <!-- Seccion de productos agregados al carrito -->
            <h2>Tus Productos</h2>
            <img src="src/img/carrito/Creatina Monohidrato Masticable Gentech Suplementos Deportivos.jpg" alt="Creatina gentech">
            <h3>Creatina Monohidrato Masticable Gentech</h3>
            <p>2,500 RD$</p>
            <img src="src/img/carrito/SAN-CREATINA-MONOHYDRATADA-10.6oz-60S.jpg" alt="SAN-CREATINA-MONOHYDRATADA">
            <h3>San Creatina Monohydratada</h3>
            <p>2,500 RD$</p>
            <img src="src/img/carrito/creatine_unflavored_300g_sept202-min.png" alt="creatine_unflavored">
            <h3>Creatine Unflavored</h3>
            <p>2,500 RD$</p>
            <!-- 
                <form action="">
                <input type="text">
            </form>  -->
        </section>
    </main>
    <aside>
        <section class="caja">
            <!-- seccion de cantidad total a pagar -->
            <p>Sub-total:</p>
            <p>0 RD$</p>
            <p>Envio:</p>
            <p>0 RD$</p>
            <p>Total:</p>
            <p>0 RD$</p>
            <form action="">
                <input id="comprar" type="button" value="comprar">
            </form>
        </section>
        <section class="pagar">
            <!-- Seccion de metodos de pago -->
            <p>Pagar con:</p>
        </section>
    </aside>
</body>
</html>
