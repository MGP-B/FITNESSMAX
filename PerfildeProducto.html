<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Producto</title>
    <link rel="icon" type="image/x-icon" href="src/img/favicon.ico">
</head>
<body>
    <header>
        <!-- Contenedor del menú de navegación -->
        <div class="menu">
            <!-- Logo de la página -->
            <div class="logo">
                <h1>Fitness <span>Max</span></h1>
            </div>
            <!-- Lista de enlaces y iconos del menú -->
            <ul class="ulista">
                <li><a href="#">Productos</a></li>
                <li><a href="#">Servicios</a></li>
                <li><a href="#"><img src="src/img/Header/icons8-magnifying-glass-white.svg" alt="Ícono de búsqueda" /></a>
                </li>
                <li><a href="#"><img src="src/img/Header/icons8-male-user-50-white.png" alt="Ícono de usuario" /></a></li>
                <li><a href="#"><img src="src/img/Header/icons8-cart-50-white.png" alt="Ícono de carrito de compras" /></a>
                </li>
                <li><a href="#"><img src="src/img/Header/Menu móvil.png" alt="Ícono de menú desplegable" /></a></li>
            </ul>
        </div>
    </header>
    <main>
        <section>
            <!-- Seccion del perfil del producto -->
            <img src="src/img/PerfildeProducto/Creatine-Mono-300G-Unflavored-Front-Flavor-Transparent.png" alt="">
            <h2>CREATINE DRIVE 300GR NUTREX</h2>
            <p>Descripcion de producto</p>
            <p>2,500 RD$</p>
            <form action="">
                <input id="Agregar" type="button" value="Agregar al Carrito">
            </form>
        </section>
    </main>
    <aside>
        <section>
            <!-- Seccion de productos similares -->
            <h2>Similares</h2>
            <img src="src/img/PerfildeProducto/iso-tropic-4lbs-de-ronnie-coleman.jpg" alt="Iso Tropic Max">
            <p>Iso Tropic Max</p>
            <p>Precio: 2,500 RD$</p>
            <form action="">
                <input id="Agrega" type="button" value="Agregar al Carrito">
            </form>
            <img src="src/img/PerfildeProducto/ISO100_3lb_Van_35315_REV001_S-02.0-1.png" alt="Iso 100">
            <p>Iso 100</p>
            <p>Precio: 2,500 RD$</p>
            <form action="">
                <input id="Agreg" type="button" value="Agregar al Carrito">
            </form>
            <img src="src/img/PerfildeProducto/Muscletech.png" alt="Muscletech">
            <p>Muscletech</p>
            <p>Precio: 2,500 RD$</p>
            <form action="">
                <input id="Agre" type="button" value="Agregar al Carrito">
            </form>
        </section>
    </aside>
</body>
</html>
